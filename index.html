<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Flashcards App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Flashcards Trainer</h1>

  <div id="lessonBox" class="box scrollable"></div>

  <div class="row">
    <div id="sourceLang">Deutsch</div>
    <button id="switchLang">⇄</button>
    <div id="targetLang">Chinesisch</div>
  </div>

  <button id="voiceSettings">Stimme einstellen</button>

  <div class="row">
    <button id="startBtn">Start Training</button>
    <button id="autoplayBtn">Autoplay</button>
  </div>

  <div id="questionBox" class="box"></div>
  <div id="answerBox" class="box"></div>

  <div class="row">
    <button id="prevBtn">Zurück</button>
    <button id="showBtn">Anzeige</button>
    <button id="nextBtn">Nächste</button>
  </div>

  <div id="resultButtons" class="row hidden">
    <button id="knownBtn">Gewusst</button>
    <button id="unknownBtn">Nicht gewusst</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
