<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flashcards – Chinesisch/Deutsch</title>
  <!-- Hinweis: PWA/Offline bewusst deaktiviert, um Online-Funktion wiederherzustellen. -->
  <!-- <link rel="manifest" href="manifest.json"> -->
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Kleine robuste Defaults, falls style.css fehlt */
    :root{--bg:#0b1320;--fg:#e9f1ff;--muted:#9fb3ca;--chip:#20314a;--btn:#305780;--accent:#4cc2ff}
    html,body{height:100%}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Noto Sans",sans-serif;background:var(--bg);color:var(--fg)}
    header{padding:16px}
    h1{margin:0 0 10px 0;font-size:22px}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn{background:var(--btn);color:#fff;border:0;border-radius:6px;padding:8px 10px;cursor:pointer}
    .switch-btn{min-width:38px}
    .container{padding:16px}
    .muted{color:var(--muted)}
    .small{font-size:12px}
    .filters{margin:8px 0 16px 0}
    .lesson-box{display:flex;gap:10px;align-items:center}
    .lesson-list{display:flex;gap:6px;overflow:auto;padding:6px 0}
    .chip{background:var(--chip);padding:6px 8px;border-radius:999px;user-select:none;white-space:nowrap}
    .chip input{margin-right:6px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
    .card{background:#141f33;border:1px solid #2a3d5c;border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px}
    .card .id{font-size:12px;color:var(--muted)}
    .lines{display:flex;flex-direction:column;gap:4px}
    .line{font-size:15px}
    .wordline{font-weight:600;font-size:18px}
    .wordline.zh{font-size:22px}
    .pos{opacity:.8;font-style:italic}
    .actions{display:flex;gap:8px;margin-top:6px}
    .speak-btn{background:transparent;border:1px solid #456aa1;border-radius:6px;padding:6px 10px;color:#d7e6ff;cursor:pointer}
    #empty{padding:20px;text-align:center;color:var(--muted)}

    /* Lernmodus */
    #studyView .study-bar{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    #studyView .study-card{background:#141f33;border:1px solid #2a3d5c;border-radius:10px;padding:14px}
    #studyView .counter{margin-left:auto;color:var(--muted)}

    /* Modal */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
    .modal-content{background:#10192b;border:1px solid #2a3d5c;border-radius:10px;min-width:280px;max-width:520px;width:92%;padding:14px}
    .modal-header{display:flex;align-items:center}
    .modal-header h2{margin:0;font-size:18px}
    .close-btn{margin-left:auto;background:transparent;border:0;color:#fff;font-size:22px;cursor:pointer}
    .modal-body{display:grid;gap:8px;margin-top:8px}
    select,input[type=range]{width:100%}
    mark{background:var(--accent);color:#001a2b}
  </style>
</head>
<body>
  <header>
    <h1>Flashcards – Chinesisch/Deutsch</h1>
    <div class="controls controls-block">
      <div id="languageSwitcher">
        <input type="hidden" id="side" value="zh" />
        <span id="sourceLang">Chinesisch</span>
        <button class="btn switch-btn" id="switchDir" title="Sprachrichtung wechseln">↔</button>
        <span id="targetLang">Deutsch</span>
      </div>
      <input id="q" placeholder="Suche (Töne ignoriert)…" />
      <button class="btn" id="ttsSettingsBtn" title="Stimme, Tonhöhe und Geschwindigkeit ändern">Stimme ändern</button>
    </div>
  </header>

  <main class="container">
    <div id="meta" class="muted small"></div>

    <section class="filters">
      <div class="legend">Lektionen (aus CSV) – scrollbare Auswahl</div>
      <div class="lesson-box">
        <label class="chip"><input type="checkbox" id="lesson_all" checked> Alle</label>
        <div id="lessonFilters" class="lesson-list"></div>
      </div>
      <div class="filter-actions">
        <button class="btn" id="startStudy">Nur diese Auswahl lernen</button>
        <span class="hint">(shuffle, nächste Karte, Zähler)</span>
      </div>
    </section>

    <section id="listView">
      <div id="count"></div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty" style="display:none;">Keine Karten gefunden.</div>
    </section>

    <section id="studyView" style="display:none;">
      <div class="study-bar">
        <button class="btn" id="exitStudy">Zurück zur Liste</button>
        <button class="btn" id="reshuffle">Shuffle neu</button>
        <div class="counter" id="counter">0 / 0</div>
      </div>
      <div class="study-card" id="studyCard">
        <div class="id" id="studyId"></div>
        <div class="lines" id="studyLines"></div>
        <div id="studyActions" class="study-actions"></div>
      </div>
    </section>
  </main>

  <!-- TTS Einstellungen Modal -->
  <div id="ttsModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>TTS Einstellungen</h2>
        <button class="close-btn" id="closeTTSModal">×</button>
      </div>
      <div class="modal-body">
        <label for="voiceSelect">Stimme (für aktuelle Sprache):</label>
        <select id="voiceSelect"></select>
        <label for="pitchSlider">Tonhöhe (Pitch): <span id="pitchValue">1.0</span></label>
        <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        <label for="rateSlider">Geschwindigkeit (Rate): <span id="rateValue">0.8</span></label>
        <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="0.8">
        <button class="btn" id="testVoiceBtn">Stimme testen</button>
        <button class="btn" id="saveTTSSettings">Speichern & Schließen</button>
      </div>
    </div>
  </div>

  <script src="app.online.js" defer></script>
</body>
</html>
