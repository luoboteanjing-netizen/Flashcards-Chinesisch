<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flashcards – Chinesisch/Deutsch</title>
  
  <!-- PWA Meta-Tags -->
  <meta name="theme-color" content="#4cc2ff">
  <meta name="description" content="Lern-App für Chinesisch-Deutsch Vokabeln mit TTS und Lernmodus">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png"> <!-- Favicon, passe an -->
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Flashcards – Chinesisch/Deutsch</h1>

    <!-- Controls unter der Überschrift für bessere Mobile-Ansicht -->
    <div class="controls controls-block">
      <!-- Language Switcher: Drei Felder in Reihe (Quell, Wechsel-Button, Ziel) -->
      <div id="languageSwitcher">
        <input type="hidden" id="side" value="zh" />
        <span id="sourceLang">Chinesisch</span>
        <button class="btn switch-btn" id="switchDir" title="Sprachrichtung wechseln">↔</button>
        <span id="targetLang">Deutsch</span>
      </div>
      <input id="q" placeholder="Suche (Töne ignoriert)…" />
      <button class="btn" id="ttsSettingsBtn" title="Stimme, Tonhöhe und Geschwindigkeit ändern">Stimme ändern</button>
    </div>
  </header>

  <main class="container">
    <div id="meta" class="muted small"></div>

    <section class="filters">
      <div class="legend">Lektionen (aus ID, erste 3 Zeichen) – scrollbare Auswahl</div>
      <div class="lesson-box">
        <label class="chip"><input type="checkbox" id="lesson_all" checked> Alle</label>
        <div id="lessonFilters" class="lesson-list"><!-- erzeugt per JS --></div>
      </div>
      <div class="filter-actions">
        <button class="btn" id="startStudy">Nur diese Auswahl lernen</button>
        <span class="hint">(shuffle, nächste Karte, Zähler)</span>
      </div>
    </section>

    <section id="listView">
      <div id="count"></div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty" style="display:none;">Keine Karten gefunden.</div>
    </section>

    <section id="studyView" style="display:none;">
      <div class="study-bar">
        <button class="btn" id="exitStudy">Zurück zur Liste</button>
        <button class="btn" id="reshuffle">Shuffle neu</button>
        <div class="counter" id="counter">0 / 0</div>
      </div>
      <div class="study-card" id="studyCard">
        <div class="id" id="studyId"></div>
        <div class="lines" id="studyLines"></div>
        <div id="studyActions" class="study-actions">
          <!-- Buttons werden dynamisch per JS gerendert -->
        </div>
      </div>
    </section>
  </main>

  <!-- TTS Einstellungen Modal -->
  <div id="ttsModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>TTS Einstellungen</h2>
        <button class="close-btn" id="closeTTSModal">&times;</button>
      </div>
      <div class="modal-body">
        <label for="voiceSelect">Stimme (für aktuelle Sprache):</label>
        <select id="voiceSelect"></select>

        <label for="pitchSlider">Tonhöhe (Pitch): <span id="pitchValue">1.0</span></label>
        <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">

        <label for="rateSlider">Geschwindigkeit (Rate): <span id="rateValue">0.8</span></label>
        <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="0.8">

        <button class="btn" id="testVoiceBtn">Stimme testen</button>
        <button class="btn" id="saveTTSSettings">Speichern & Schließen</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
